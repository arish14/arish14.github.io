<html lang="en">
<head>
<meta charset="UTF-8"/>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#00d4aa;
  --acc2:#4f8ef7;
  --bg:#070b0f;
  --surf:#0d1520;
  --surf2:#111d2c;
  --bdr:#1a2a3a;
  --txt:#e2e8f0;
  --muted:#4a6080;
  --muted2:#2a3a50;
  --font:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--txt);overflow-x:hidden}

/* GRID BG */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.grid-bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(0,212,170,0.06) 0%,transparent 70%);
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 48px;
  transition:all 0.3s;
}
nav.scrolled{
  background:rgba(7,11,15,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  padding:14px 48px;
}
.nav-logo{font-family:var(--mono);font-size:13px;color:var(--acc);letter-spacing:0.05em}
.nav-links{display:flex;gap:32px}
.nav-links a{
  font-size:12px;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--muted);text-decoration:none;
  transition:color 0.2s;cursor:pointer;
}
.nav-links a:hover,.nav-links a.active{color:var(--acc)}
.nav-cta{
  font-family:var(--mono);font-size:11px;
  border:1px solid var(--acc);color:var(--acc);
  padding:8px 18px;text-decoration:none;
  transition:all 0.2s;letter-spacing:0.08em;
}
.nav-cta:hover{background:var(--acc);color:var(--bg)}

/* HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  justify-content:center;padding:120px 80px 80px;
  position:relative;z-index:1;max-width:1400px;margin:0 auto;
}
.hero-eyebrow{
  font-family:var(--mono);font-size:12px;color:var(--acc);
  letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:24px;display:flex;align-items:center;gap:12px;
}
.hero-eyebrow::before{content:'';width:40px;height:1px;background:var(--acc)}
.hero-name{
  font-size:clamp(56px,8vw,112px);font-weight:700;
  line-height:0.95;letter-spacing:-0.03em;
  color:var(--txt);margin-bottom:16px;
}
.hero-name span{color:var(--acc)}
.hero-role{
  font-size:clamp(20px,3vw,36px);font-weight:300;
  color:var(--muted);margin-bottom:48px;
  display:flex;align-items:center;gap:12px;min-height:44px;
}
.typed-text{color:var(--txt);font-weight:400}
.cursor{display:inline-block;width:2px;height:1em;background:var(--acc);animation:blink 1s infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hero-summary{
  max-width:580px;font-size:16px;line-height:1.8;
  color:var(--muted);font-weight:300;margin-bottom:48px;
}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:80px}
.btn-primary{
  background:var(--acc);color:var(--bg);
  padding:14px 32px;font-size:13px;font-weight:600;
  text-decoration:none;letter-spacing:0.06em;
  transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;
}
.btn-primary:hover{background:#00f0c0;transform:translateY(-2px)}
.btn-ghost{
  border:1px solid var(--bdr);color:var(--txt);
  padding:14px 32px;font-size:13px;font-weight:400;
  text-decoration:none;letter-spacing:0.06em;
  transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;
}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}
.hero-stats{
  display:flex;gap:48px;border-top:1px solid var(--bdr);
  padding-top:40px;flex-wrap:wrap;
}
.hero-stat-num{
  font-size:36px;font-weight:700;color:var(--txt);
  font-family:var(--mono);line-height:1;margin-bottom:6px;
}
.hero-stat-num span{color:var(--acc)}
.hero-stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted)}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(32px);transition:opacity 0.7s cubic-bezier(0.4,0,0.2,1),transform 0.7s cubic-bezier(0.4,0,0.2,1)}
.reveal.visible{opacity:1;transform:none}
.reveal-delay-1{transition-delay:0.1s}
.reveal-delay-2{transition-delay:0.2s}
.reveal-delay-3{transition-delay:0.3s}
.reveal-delay-4{transition-delay:0.4s}

/* SECTIONS */
section{position:relative;z-index:1;padding:120px 80px;max-width:1400px;margin:0 auto}
.sec-label{
  font-family:var(--mono);font-size:11px;text-transform:uppercase;
  letter-spacing:0.2em;color:var(--acc);margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
}
.sec-label::before{content:'//';opacity:0.4}
.sec-title{
  font-size:clamp(36px,5vw,64px);font-weight:700;
  line-height:1.0;letter-spacing:-0.02em;margin-bottom:64px;
}
.sec-title em{font-style:normal;color:var(--acc)}

/* ABOUT */
.about-layout{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.about-photo-wrap{position:relative}
.about-photo{
  width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;
  filter:grayscale(20%);
}
.about-photo-wrap::before{
  content:'';position:absolute;inset:-12px;
  border:1px solid var(--acc);opacity:0.3;
  transform:translate(12px,12px);z-index:-1;
}
.about-tag{
  position:absolute;bottom:24px;left:24px;
  background:var(--bg);border:1px solid var(--bdr);
  padding:12px 16px;font-family:var(--mono);font-size:11px;color:var(--acc);
  letter-spacing:0.08em;
}
.about-content{}
.about-text{font-size:16px;line-height:1.85;color:rgba(226,232,240,0.75);font-weight:300;margin-bottom:40px}
.about-text p+p{margin-top:16px}
.about-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:40px}
.chip{
  font-family:var(--mono);font-size:11px;
  border:1px solid var(--bdr);color:var(--muted);
  padding:6px 14px;letter-spacing:0.05em;
  transition:all 0.2s;cursor:default;
}
.chip:hover{border-color:var(--acc);color:var(--acc)}
.edu-block{border-left:2px solid var(--bdr);padding-left:20px;margin-bottom:16px}
.edu-deg{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:2px}
.edu-school{font-family:var(--mono);font-size:11px;color:var(--acc);margin-bottom:2px;letter-spacing:0.05em}
.edu-meta{font-size:12px;color:var(--muted)}

/* SKILLS */
.skills-layout{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.skill-cell{
  background:var(--surf);padding:32px 28px;
  border:1px solid var(--bdr);
  transition:all 0.3s;position:relative;overflow:hidden;
}
.skill-cell::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--acc);transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s ease;
}
.skill-cell:hover::after{transform:scaleX(1)}
.skill-cell:hover{background:var(--surf2)}
.skill-cell-icon{font-size:24px;margin-bottom:16px}
.skill-cell-name{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:6px}
.skill-cell-level{font-family:var(--mono);font-size:10px;color:var(--acc);letter-spacing:0.1em;margin-bottom:16px}
.skill-mini-bar{height:2px;background:var(--bdr);margin-bottom:4px}
.skill-mini-fill{height:100%;background:var(--acc);width:0%;transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}

/* EXPERIENCE */
.exp-layout{display:grid;grid-template-columns:1fr 2fr;gap:80px}
.exp-nav{position:sticky;top:120px;height:fit-content}
.exp-tab{
  padding:16px 20px;margin-bottom:2px;cursor:pointer;
  border-left:2px solid var(--bdr);
  font-size:13px;color:var(--muted);
  transition:all 0.2s;
}
.exp-tab:hover{color:var(--txt);border-left-color:var(--muted)}
.exp-tab.active{border-left-color:var(--acc);color:var(--acc);background:rgba(0,212,170,0.05)}
.exp-tab-co{font-weight:600;display:block;margin-bottom:2px}
.exp-tab-period{font-family:var(--mono);font-size:10px;letter-spacing:0.05em}
.exp-content{}
.exp-panel{display:none}
.exp-panel.active{display:block;animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.exp-role{font-size:28px;font-weight:700;margin-bottom:4px;letter-spacing:-0.01em}
.exp-company{font-family:var(--mono);font-size:12px;color:var(--acc);letter-spacing:0.08em;margin-bottom:32px}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:16px}
.exp-bullets li{
  font-size:14px;line-height:1.75;color:rgba(226,232,240,0.7);
  padding-left:20px;position:relative;
}
.exp-bullets li::before{
  content:'▸';position:absolute;left:0;color:var(--acc);font-size:12px;top:3px;
}
.exp-tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:24px}
.exp-tag{
  font-family:var(--mono);font-size:10px;
  background:rgba(0,212,170,0.08);color:var(--acc);
  padding:4px 10px;letter-spacing:0.05em;
}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bdr)}
.proj-card{
  background:var(--surf);padding:36px 32px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:background 0.3s;
  transform-style:preserve-3d;
}
.proj-card:hover{background:var(--surf2)}
.proj-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:0;transition:opacity 0.3s;
}
.proj-card:hover::before{opacity:1}
.proj-num{
  font-family:var(--mono);font-size:11px;color:var(--muted2);
  margin-bottom:20px;letter-spacing:0.1em;
}
.proj-lang{
  display:inline-block;font-family:var(--mono);font-size:10px;
  color:var(--acc);background:rgba(0,212,170,0.08);
  padding:3px 10px;margin-bottom:16px;letter-spacing:0.08em;
}
.proj-title{font-size:18px;font-weight:600;line-height:1.3;margin-bottom:12px;letter-spacing:-0.01em}
.proj-desc{font-size:13px;line-height:1.7;color:var(--muted);font-weight:300;margin-bottom:24px}
.proj-footer{display:flex;align-items:center;justify-content:space-between}
.proj-tags{display:flex;gap:6px;flex-wrap:wrap}
.proj-tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.05em}
.proj-link{
  display:flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:11px;color:var(--acc);
  text-decoration:none;letter-spacing:0.05em;
  transition:gap 0.2s;flex-shrink:0;
}
.proj-link:hover{gap:10px}
.proj-stars{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.loading-repos{
  grid-column:1/-1;padding:60px;text-align:center;
  font-family:var(--mono);font-size:13px;color:var(--muted);
}
.loading-dot{display:inline-block;animation:pulse 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}
.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}

/* CONTACT */
.contact-wrap{
  border:1px solid var(--bdr);padding:80px;
  background:var(--surf);display:grid;
  grid-template-columns:1fr 1fr;gap:80px;align-items:center;
}
.contact-title{font-size:48px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin-bottom:24px}
.contact-title em{font-style:normal;color:var(--acc)}
.contact-sub{font-size:15px;color:var(--muted);line-height:1.7;font-weight:300;margin-bottom:40px}
.contact-links{display:flex;flex-direction:column;gap:16px}
.contact-link{
  display:flex;align-items:center;gap:16px;
  text-decoration:none;color:var(--muted);
  font-size:14px;padding:16px 20px;
  border:1px solid var(--bdr);
  transition:all 0.2s;
}
.contact-link:hover{border-color:var(--acc);color:var(--txt);background:rgba(0,212,170,0.04)}
.contact-link-icon{font-family:var(--mono);font-size:12px;color:var(--acc);width:24px}
.contact-link-label{flex:1}
.contact-link-arrow{color:var(--acc);transition:transform 0.2s}
.contact-link:hover .contact-link-arrow{transform:translateX(4px)}

/* TWEAKS */
.tweaks-panel{
  position:fixed;bottom:32px;right:32px;
  background:var(--surf);border:1px solid var(--bdr);
  padding:24px;width:240px;z-index:999;
  display:none;font-size:12px;
}
.tweaks-panel.open{display:block}
.tweaks-panel-title{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--muted);margin-bottom:20px;text-transform:uppercase}
.tweak-row{margin-bottom:16px}
.tweak-label{font-size:11px;color:var(--muted);margin-bottom:8px;display:block}
.swatch-row{display:flex;gap:8px}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s}
.swatch:hover{transform:scale(1.2)}
.swatch.on{border-color:#fff}
.mode-toggle{display:flex;border:1px solid var(--bdr)}
.mode-btn{flex:1;padding:7px;font-size:10px;font-family:var(--mono);background:transparent;color:var(--muted);border:none;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s}
.mode-btn.on{background:var(--acc);color:var(--bg)}

/* FOOTER */
footer{
  position:relative;z-index:1;
  border-top:1px solid var(--bdr);
  padding:32px 80px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.05em;
}

@media(max-width:1024px){
  .about-layout,.exp-layout,.contact-wrap{grid-template-columns:1fr}
  .skills-layout{grid-template-columns:repeat(2,1fr)}
  .projects-grid{grid-template-columns:repeat(2,1fr)}
  section{padding:80px 40px}
  nav{padding:16px 32px}
  .hero{padding:120px 40px 80px}
}
@media(max-width:640px){
  .projects-grid,.skills-layout{grid-template-columns:1fr}
  section{padding:60px 24px}
  .hero{padding:100px 24px 60px}
  nav{padding:16px 24px}
  .nav-links{display:none}
  .contact-wrap{padding:40px 24px}
  footer{padding:24px}
}
</style>
</head>

// Typing animation hook
function useTyping(words, speed=80, pause=1800) {
  const [display, setDisplay] = useState('');
  const [wi, setWi] = useState(0);
  const [typing, setTyping] = useState(true);
  useEffect(() => {
    const word = words[wi];
    let timer;
    if (typing) {
      if (display.length < word.length) {
        timer = setTimeout(() => setDisplay(word.slice(0, display.length+1)), speed);
      } else {
        timer = setTimeout(() => setTyping(false), pause);
      }
    } else {
      if (display.length > 0) {
        timer = setTimeout(() => setDisplay(display.slice(0,-1)), speed/2);
      } else {
        setWi((wi+1)%words.length);
        setTyping(true);
      }
    }
    return () => clearTimeout(timer);
  }, [display, typing, wi]);
  return display;
}

// Intersection observer hook
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.15 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

// CountUp hook
function useCountUp(target, duration=1600) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      obs.disconnect();
      let start = null;
      const step = (ts) => {
        if (!start) start = ts;
        const p = Math.min((ts-start)/duration, 1);
        setVal(Math.round(p*target));
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }, { threshold: 0.5 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [target]);
  return [val, ref];
}

function StatNum({ target, suffix='' }) {
  const [val, ref] = useCountUp(target);
  return <span ref={ref}>{val}{suffix}</span>;
}

function SkillCard({ icon, name, level, pct, delay }) {
  const ref = useRef(null);
  const [filled, setFilled] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setFilled(true); obs.disconnect(); }
    }, { threshold: 0.3 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className="skill-cell reveal" style={{ transitionDelay: `${delay}ms` }}>
      <div className="skill-cell-icon">{icon}</div>
      <div className="skill-cell-name">{name}</div>
      <div className="skill-cell-level">{level}</div>
      <div className="skill-mini-bar">
        <div className="skill-mini-fill" style={{ width: filled ? `${pct}%` : '0%', transitionDelay: `${delay+200}ms` }}/>
      </div>
    </div>
  );
}
